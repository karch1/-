<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>스마트 캘린더</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { margin:0; font-family:Inter; background:#f3f4f6; }

.calendar-container {
    max-width:1200px;
    margin:auto;
    padding:1rem;
    display:flex;
    flex-direction:column;
}

.calendar-grid {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:1px;
    background:#e5e7eb;
    border-radius:12px;
    overflow:hidden;
}

.calendar-day {
    background:#fff;
    min-height:100px;
    padding:6px;
    cursor:pointer;
}

.day-label {
    text-align:center;
    padding:10px;
    font-weight:bold;
}

.event-bar {
    font-size:11px;
    padding:2px 4px;
    margin-top:2px;
    border-radius:6px;
    color:#fff;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#fff;
    width:95%;
    max-width:500px;
    padding:20px;
    border-radius:12px;
}

button {
    padding:6px 10px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="calendar-container">

<header class="flex justify-between mb-4">
    <h2 id="month"></h2>
    <div>
        <button onclick="login()">로그인</button>
        <button id="logoutBtn" onclick="logout()" style="display:none;">로그아웃</button>
    </div>
</header>

<div id="calendar" class="calendar-grid"></div>
</div>

<!-- 상세 -->
<div id="detailModal" class="modal" onclick="closeModal('detailModal')">
<div class="modal-box" onclick="event.stopPropagation()">
    <div id="detailContent"></div>
</div>
</div>

<!-- 입력 -->
<div id="editModal" class="modal" onclick="closeModal('editModal')">
<div class="modal-box" onclick="event.stopPropagation()">

<input id="title" placeholder="제목" class="w-full border p-2 mb-2">
<input id="time" type="time" class="w-full border p-2 mb-2">
<textarea id="memo" class="w-full border p-2 mb-2"></textarea>

<button onclick="saveEvent()" class="bg-blue-500 text-white w-full">저장</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"xxx",
 authDomain:"xxx",
 projectId:"xxx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const ADMIN_EMAIL = "choae000@gmail.com";

let state = {
 user:null,
 events:[],
 selectedDate:null,
 editId:null,
 selectedEvent:null
};

function isAdmin(){
 return state.user?.email === ADMIN_EMAIL;
}

function isOwner(e){
 return state.user?.email === e.userEmail;
}

/* 로그인 */
window.login = () => signInWithPopup(auth, provider);
window.logout = () => signOut(auth);

onAuthStateChanged(auth, user=>{
 const logoutBtn = document.getElementById("logoutBtn");

 if(user){
  state.user = user;
  logoutBtn.style.display="inline-block";
  load();
 }else{
  state.user=null;
  logoutBtn.style.display="none";
 }
});

/* load */
async function load(){
 const snap = await getDocs(collection(db,"events"));
 state.events = snap.docs.map(d=>({id:d.id,...d.data()}));
 render();
}

/* render */
function render(){
 const cal = document.getElementById("calendar");
 cal.innerHTML="";

 const y = new Date().getFullYear();
 const m = new Date().getMonth();

 document.getElementById("month").innerText = `${y}년 ${m+1}월`;

 const first = new Date(y,m,1).getDay();
 const last = new Date(y,m+1,0).getDate();

 const days = ["일","월","화","수","목","금","토"];

 days.forEach(d=>{
  let el=document.createElement("div");
  el.className="day-label";
  el.innerText=d;
  cal.appendChild(el);
 });

 for(let i=0;i<first;i++) cal.appendChild(document.createElement("div"));

 for(let d=1; d<=last; d++){

  let dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  let box=document.createElement("div");
  box.className="calendar-day";

  let events = state.events.filter(e=>e.date===dateStr);

  events.forEach(e=>{
    let bar=document.createElement("div");
    bar.className="event-bar";
    bar.style.background=e.userColor;
    bar.innerText=e.title;

    bar.onclick=()=>openDetail(e);
    box.appendChild(bar);
  });

  box.onclick=()=>openEdit(dateStr);

  cal.appendChild(box);
 }
}

/* 상세 */
window.openDetail=(e)=>{
 state.selectedEvent=e;

 let btn="";

 if(isAdmin() || isOwner(e)){
  btn+=`
   <button onclick="editEvent()" class="bg-blue-500 text-white">수정</button>
   <button onclick="deleteEvent()" class="bg-red-500 text-white">삭제</button>
  `;
 }

 document.getElementById("detailContent").innerHTML=`
  <h3>${e.title}</h3>
  <p>${e.memo||""}</p>
  ${btn}
 `;

 document.getElementById("detailModal").style.display="flex";
};

/* 수정 */
window.editEvent=()=>{
 let e=state.selectedEvent;
 state.editId=e.id;

 document.getElementById("title").value=e.title;
 document.getElementById("time").value=e.time||"";
 document.getElementById("memo").value=e.memo||"";

 document.getElementById("editModal").style.display="flex";
 document.getElementById("detailModal").style.display="none";
};

/* 삭제 */
window.deleteEvent=async()=>{
 await deleteDoc(doc(db,"events",state.selectedEvent.id));
 await load();
 closeModal("detailModal");
};

/* 저장 */
window.saveEvent=async()=>{

 const data={
  date:state.selectedEvent?.date || new Date().toISOString().split("T")[0],
  title:document.getElementById("title").value,
  time:document.getElementById("time").value,
  memo:document.getElementById("memo").value,
  userEmail:state.user.email,
  userColor:"#6366f1"
 };

 if(state.editId){
  await updateDoc(doc(db,"events",state.editId),data);
 }else{
  await addDoc(collection(db,"events"),data);
 }

 closeModal("editModal");
 load();
};

/* open edit */
window.openEdit=(date)=>{
 state.selectedEvent={date};
 state.editId=null;
 document.getElementById("editModal").style.display="flex";
};

/* modal */
window.closeModal=(id)=>{
 document.getElementById(id).style.display="none";
};

</script>

</body>
</html>
