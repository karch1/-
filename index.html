<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>나의 스마트 스케줄러</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        :root {
            --calendar-bg: #ffffff;
            --day-hover: #f9fafb;
            --sunday-text: #ef4444;
            --saturday-text: #3b82f6;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f3f4f6;
            overscroll-behavior: none;
            margin: 0;
            padding: 0;
        }

        .calendar-container {
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            grid-auto-rows: minmax(100px, 1fr);
            background-color: #e5e7eb;
            gap: 1px;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
            flex-grow: 1;
        }

        @media (min-width: 768px) {
            .calendar-grid { grid-auto-rows: minmax(140px, 1fr); }
        }

        .calendar-day {
            background: var(--calendar-bg);
            padding: 6px;
            transition: background 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 2px;
            position: relative;
            min-width: 0;
            overflow: hidden;
        }

        .calendar-day:hover { background: var(--day-hover); }
        .calendar-day.today { background: #fffbeb; }
        .calendar-day.selected { outline: 3px solid #4f46e5; z-index: 10; }
        
        .day-num {
            font-weight: 700;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            margin-bottom: 4px;
        }

        .day-label {
            text-align: center;
            padding: 12px 0;
            font-weight: 800;
            font-size: 0.75rem;
            color: #6b7280;
            background: #fff;
        }

        .event-bar {
            font-size: clamp(0.6rem, 1.5vw, 0.7rem);
            padding: 3px 6px;
            border-radius: 6px;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 700;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 1rem;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .comment-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            background: #f9fafb;
            padding: 10px 14px;
            border-radius: 12px;
            border-left: 4px solid #e5e7eb;
            margin-bottom: 8px;
        }

        .comment-text {
            font-size: 0.85rem;
            color: #4b5563;
            font-weight: 500;
            line-height: 1.4;
            word-break: break-all;
        }

        .comment-delete {
            color: #d1d5db;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 4px;
        }

        .comment-delete:hover {
            color: #ef4444;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 800;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
            background: #4338ca;
        }

        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>

<body>

<div class="calendar-container">
    <header class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 id="monthDisplay"
                class="text-2xl md:text-3xl font-extrabold text-gray-900 tracking-tight">
                불러오는 중...
            </h1>
        </div>

        <div class="flex gap-2">
            <button id="prevMonth"
                    class="bg-white border-2 border-gray-100 p-2 px-5 rounded-2xl font-bold shadow-sm active:bg-gray-50 text-gray-700">
                이전
            </button>

            <button id="nextMonth"
                    class="bg-white border-2 border-gray-100 p-2 px-5 rounded-2xl font-bold shadow-sm active:bg-gray-50 text-gray-700">
                다음
            </button>
        </div>
    </header>

    <div id="calendar" class="calendar-grid shadow-2xl"></div>

    <footer class="mt-6 flex justify-center gap-4">
        <button id="exportBtn"
                class="text-xs font-bold text-gray-400 hover:text-indigo-500 transition-colors">
            데이터 백업
        </button>

        <button id="importBtn"
                class="text-xs font-bold text-gray-400 hover:text-indigo-500 transition-colors">
            데이터 복구
        </button>

        <input type="file" id="importFile" class="hidden">
    </footer>
</div>

<div id="dayModal" class="modal-overlay" onclick="closeModal('dayModal')">
    <div class="modal-content p-7" onclick="event.stopPropagation()">

        <div class="flex justify-between items-start mb-6">
            <div>
                <h2 id="modalDateTitle"
                    class="text-2xl font-black text-gray-900">날짜</h2>

                <p class="text-sm text-gray-400 font-bold">
                    오늘의 일정
                </p>
            </div>

            <button onclick="closeModal('dayModal')"
                    class="text-gray-300 hover:text-gray-500 text-3xl font-light">
                &times;
            </button>
        </div>

        <div id="modalEventList" class="space-y-4 mb-8"></div>

        <button onclick="openAddForm()"
                class="btn-primary flex items-center justify-center gap-2">
            <span>+</span>
            <span>새로운 일정 추가</span>
        </button>

    </div>
</div>

<div id="editModal" class="modal-overlay" onclick="closeModal('editModal')">
    <div class="modal-content p-7" onclick="event.stopPropagation()">

        <div class="flex justify-between items-center mb-6">
            <h2 id="formTitle"
                class="text-xl font-black text-indigo-600">
                📅 일정 작성
            </h2>

            <button onclick="closeModal('editModal')"
                    class="text-gray-300 hover:text-gray-500 text-3xl font-light">
                &times;
            </button>
        </div>

        <div class="space-y-5">

            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">
                    일정 제목
                </label>

                <input type="text"
                       id="eventTitle"
                       placeholder="일정 이름을 입력하세요"
                       class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-indigo-500 outline-none font-bold">
            </div>

            <div class="grid grid-cols-2 gap-4">

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">
                        시간
                    </label>

                    <input type="time"
                           id="eventTime"
                           class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none font-bold">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">
                        색상
                    </label>

                    <select id="eventColor"
                            class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none font-bold">
                        <option value="#6366f1">보라 (업무)</option>
                        <option value="#ef4444">빨강 (중요)</option>
                        <option value="#10b981">초록 (운동)</option>
                        <option value="#f59e0b">노랑 (약속)</option>
                        <option value="#ec4899">핑크 (생일)</option>
                    </select>
                </div>

            </div>

            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">
                    상세 메모
                </label>

                <textarea id="eventInitialMemo"
                          rows="3"
                          placeholder="메모를 함께 입력하세요 (선택)"
                          class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-indigo-500 outline-none font-bold text-sm"></textarea>
            </div>

            <input type="hidden" id="editId">

            <button id="saveBtn" class="btn-primary">
                일정 저장하기
            </button>

        </div>
    </div>
</div>

<div id="commentModal" class="modal-overlay" onclick="closeModal('commentModal')">
    <div class="modal-content p-7" onclick="event.stopPropagation()">

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-indigo-600">
                📝 메모 추가
            </h2>

            <button onclick="closeModal('commentModal')"
                    class="text-gray-300 hover:text-gray-500 text-3xl font-light">
                &times;
            </button>
        </div>

        <div class="space-y-5">

            <textarea id="commentInput"
                      rows="4"
                      class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-indigo-500 outline-none font-bold text-sm"
                      placeholder="메모 내용을 입력하세요..."></textarea>

            <input type="hidden" id="commentTargetId">

            <button id="saveCommentBtn" class="btn-primary">
                메모 저장
            </button>

        </div>
    </div>
</div>

<div id="toast">메시지가 표시됩니다.</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

/* =========================
   FIREBASE INIT
========================= */
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.firebaseapp.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* =========================
   STATE
========================= */
const state = {
    currentDate: new Date(),
    events: [],
    selectedDateStr: null,
    currentUser: null
};

/* =========================
   USER MAP
========================= */
const userColorMap = {
    "choae000@gmail.com": { name: "갈치", color: "#6366f1" },
    "ssang9764@gmail.com": { name: "생마", color: "#38bdf8" },
    "cksgml0@naver.com": { name: "연막", color: "#8b5e3c" },
};

/* =========================
   ELEMENTS
========================= */
const calendarEl = document.getElementById('calendar');
const monthDisplay = document.getElementById('monthDisplay');

/* =========================
   TOAST
========================= */
function showToast(msg){
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.opacity = 1;
    setTimeout(()=>t.style.opacity=0,2000);
}

/* =========================
   🔥 핵심 FIX 1: openAddForm 추가
========================= */
window.openAddForm = function(){

    if(!state.currentUser){
        showToast("로그인 필요");
        return;
    }

    document.getElementById('eventTitle').value = "";
    document.getElementById('eventTime').value = "";
    document.getElementById('eventInitialMemo').value = "";

    document.getElementById('editModal').style.display = "flex";
};

/* =========================
   🔥 핵심 FIX 2: 모달 닫기
========================= */
window.closeModal = function(id){
    document.getElementById(id).style.display = "none";
};

/* =========================
   AUTH
========================= */
onAuthStateChanged(auth, (user)=>{

    if(user){

        if(!userColorMap[user.email]){
            alert("허용되지 않은 사용자");
            signOut(auth);
            return;
        }

        const p = userColorMap[user.email];

        state.currentUser = {
            uid: user.uid,
            email: user.email,
            name: p.name,
            color: p.color
        };

        loadEvents();

    } else {
        state.currentUser = null;
        state.events = [];
        renderCalendar();
    }
});

/* =========================
   CALENDAR RENDER
========================= */
function renderCalendar(){

    calendarEl.innerHTML = '';

    const y = state.currentDate.getFullYear();
    const m = state.currentDate.getMonth();

    monthDisplay.innerText = `${y}년 ${m+1}월`;

    const days = ['일','월','화','수','목','금','토'];

    days.forEach(d=>{
        const el = document.createElement('div');
        el.className = "day-label";
        el.innerText = d;
        calendarEl.appendChild(el);
    });

    const first = new Date(y,m,1).getDay();
    const last = new Date(y,m+1,0).getDate();

    for(let i=0;i<first;i++){
        calendarEl.appendChild(document.createElement('div'));
    }

    for(let d=1; d<=last; d++){

        const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        const div = document.createElement('div');
        div.className = "calendar-day";

        div.innerHTML = `<span class="day-num">${d}</span>`;

        const events = state.events.filter(e=>e.date === dateStr);

        events.forEach(e=>{
            const bar = document.createElement('div');
            bar.className = "event-bar";
            bar.style.background = e.userColor;
            bar.innerText = e.title;
            div.appendChild(bar);
        });

        div.onclick = ()=>openDayModal(dateStr);

        calendarEl.appendChild(div);
    }
}

/* =========================
   MODAL OPEN
========================= */
window.openDayModal = function(dateStr){

    state.selectedDateStr = dateStr;

    const modal = document.getElementById('dayModal');
    const list = document.getElementById('modalEventList');
    const title = document.getElementById('modalDateTitle');

    title.innerText = dateStr;

    const events = state.events.filter(e=>e.date===dateStr);

    list.innerHTML = "";

    if(events.length === 0){
        list.innerHTML = "일정 없음";
    }

    events.forEach(e=>{
        const div = document.createElement('div');
        div.className = "p-3 bg-gray-100 rounded-xl";

        div.innerHTML = `
            <b>${e.title}</b><br/>
            <small>${e.time || ""}</small>
        `;

        list.appendChild(div);
    });

    modal.style.display = "flex";
};

/* =========================
   LOAD EVENTS
========================= */
async function loadEvents(){

    const snap = await getDocs(collection(db,"events"));

    state.events = [];

    snap.forEach(d=>{
        state.events.push({
            id:d.id,
            ...d.data()
        });
    });

    renderCalendar();
}

/* =========================
   SAVE EVENT
========================= */
document.getElementById('saveBtn').onclick = async ()=>{

    if(!state.selectedDateStr){
        return showToast("날짜 선택 먼저");
    }

    const title = document.getElementById('eventTitle').value.trim();
    const time = document.getElementById('eventTime').value;

    if(!title) return showToast("제목 입력");

    const data = {
        date: state.selectedDateStr,
        title,
        time,
        userColor: state.currentUser.color,
        userUid: state.currentUser.uid,
        createdAt: new Date()
    };

    const ref = await addDoc(collection(db,"events"), data);

    state.events.push({
        id: ref.id,
        ...data
    });

    renderCalendar();
    closeModal('editModal');

    showToast("저장 완료");
};

/* =========================
   INIT
========================= */
renderCalendar();

</script>
    
</body>
</html>
