<script type="module">

    import { initializeApp }
        from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
        deleteDoc,

        doc,
        onSnapshot,
        query,
        orderBy,
        limit,

    }
        
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    import {
        getAuth,
        GoogleAuthProvider,
        signInWithPopup,
        onAuthStateChanged,
        signOut
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    import {
    getMessaging,
    getToken,
    onMessage
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-messaging.js";

    /* =========================
       FIREBASE INIT
    ========================= */

    const firebaseConfig = {

        apiKey: "AIzaSyBU3jeOqj_FCBXeO2ghh5XlHBrQbUjNaiA",

        authDomain: "ahn-jin-zero.firebaseapp.com",

        projectId: "ahn-jin-zero",

        storageBucket: "ahn-jin-zero.firebasestorage.app",

        messagingSenderId: "55250475892",

        appId: "1:55250475892:web:c87555da879be518faaa21",

        measurementId: "G-V2TEL4TNPJ"
    };

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    const auth = getAuth(app);

    const provider = new GoogleAuthProvider();

    const messaging = getMessaging(app);

    /* =========================
       STATE
    ========================= */

    const state = {

        currentDate: new Date(),

        events: [],

        selectedDateStr: null,

        currentUser: null,

        editId: null,

        selectedEvent: null,

        viewMode: "list"
    };

    let chatUnsub = null;

    /* =========================
       USER MAP
    ========================= */

    const userColorMap = {

    "choae000@gmail.com": {
        name: "갈치",
        color: "#6366f1"
    },

    "ssang9764@gmail.com": {
        name: "생마",
        color: "#38bdf8"
    },

    "cksgml0@naver.com": {
        name: "연막",
        color: "#8b5e3c"
    },

    "ahn7770@gmail.com": {
        name: "안크",
        color: "#ef4444"
    },

    "huigi@email.com": {
        name: "희기",
        color: "#f97316"
    }
};

/* =========================
   ADMIN
========================= */

const ADMIN_EMAIL = "choae000@gmail.com";

function isAdmin(){

    return state.currentUser?.email === ADMIN_EMAIL;
}

function canEditEvent(eventData){

    if(!state.currentUser)
        return false;

    // 관리자면 전부 가능
    if(isAdmin())
        return true;

    // 일반유저는 자기것만
    return eventData.userEmail === state.currentUser.email;
}

    /* =========================
       SHIFT LOGIC
       5/4 기준:
       주/오/야 5일 + 2휴 반복
    ========================= */

    const SHIFT_START = new Date("2026-05-04");

    const SHIFT_PATTERN = [

        "주간","주간","주간","주간","주간",

        "휴","휴",

        "오후","오후","오후","오후","오후",

        "휴","휴",

        "야간","야간","야간","야간","야간",

        "휴","휴"
    ];

    function getShiftLabel(dateStr){

        const target = new Date(dateStr);

        const diff = Math.floor(
            (target - SHIFT_START) / (1000*60*60*24)
        );

        if(diff < 0) return "";

        return SHIFT_PATTERN[
            diff % SHIFT_PATTERN.length
        ];
    }

    /* =========================
       ELEMENTS
    ========================= */

    const calendarEl =
        document.getElementById('calendar');

    const monthDisplay =
        document.getElementById('monthDisplay');

    /* =========================
       TOAST
    ========================= */

    function showToast(msg){

        const t =
            document.getElementById('toast');

        t.innerText = msg;

        t.style.opacity = 1;

        setTimeout(()=>{
            t.style.opacity = 0;
        },2000);
    }

    /* =========================
       LOGIN
    ========================= */

    window.loginGoogle = async () => {

        await signInWithPopup(auth, provider);

        showToast("로그인 완료");
    };

    window.logoutGoogle = async () => {

        await signOut(auth);

        showToast("로그아웃 완료");
    };

    /* =========================
       AUTH
    ========================= */

    onAuthStateChanged(auth, (user)=>{

    const loginBtn =
        document.getElementById("loginBtn");

    const logoutBtn =
        document.getElementById("logoutBtn");

    if(user && userColorMap[user.email]){

        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";

        const p = userColorMap[user.email];

        state.currentUser = {

            uid: user.uid,

            email: user.email,

            name: p.name,

            color: p.color
        };

        loadEvents();
        listenChat(); // ⭐⭐⭐ 여기 넣는 게 정석
        

    } else {

        loginBtn.style.display = "block";
        logoutBtn.style.display = "none";

        state.currentUser = null;

        state.events = [];

        renderCalendar();
    }
});

    /* =========================
       LOAD
    ========================= */

    async function loadEvents(){

        const snap =
            await getDocs(collection(db,"events"));

        state.events = [];

        snap.forEach(d=>{

            state.events.push({

                id:d.id,
                ...d.data()
            });
        });

        renderCalendar();
    }

    /* =========================
       OPEN ADD
    ========================= */

    window.openAddForm = function(){

        if(!state.currentUser)
            return showToast("로그인 필요");

        state.editId = null;

        document.getElementById('eventTitle').value = "";

        document.getElementById('eventTime').value = "";

        document.getElementById('eventInitialMemo').value = "";

        document.getElementById('editModal').style.display = "flex";
    };
    /* =========================
   MONTH MOVE
========================= */

window.prevMonth = function(){

    state.currentDate.setMonth(
        state.currentDate.getMonth() - 1
    );

    renderCalendar();
};

window.nextMonth = function(){

    state.currentDate.setMonth(
        state.currentDate.getMonth() + 1
    );

    renderCalendar();
};

    const sidebar =
    document.getElementById("userSidebar");

const sidebarToggle =
    document.getElementById("sidebarToggle");

sidebarToggle.onclick = ()=>{

    sidebar.classList.toggle("active");
};

    /* =========================
   MOBILE CHAT TOGGLE
========================= */

const mobileChatToggle =
    document.getElementById("mobileChatToggle");

const chatSidebar =
    document.getElementById("chatSidebar");

mobileChatToggle.onclick = ()=>{

    if(
        chatSidebar.classList.contains("chat-open")
    ){

        chatSidebar.classList.remove("chat-open");

        chatSidebar.classList.add("chat-closed");

    } else {

        chatSidebar.classList.remove("chat-closed");

        chatSidebar.classList.add("chat-open");
    }
};

    /* =========================
       EDIT OPEN
    ========================= */

    window.editEvent = function(e){
    if(!canEditEvent(e)){
    return showToast("본인 일정만 수정 가능");
}
        state.editId = e.id;

        document.getElementById('eventTitle').value = e.title;

        document.getElementById('eventTime').value = e.time || "";

        document.getElementById('eventInitialMemo').value = e.memo || "";

        document.getElementById('editModal').style.display = "flex";
    };

    /* =========================
       DELETE
    ========================= */

    window.deleteEvent = async function(id){

    const target =
        state.events.find(e => e.id === id);

    if(!target){
        return showToast("일정을 찾을 수 없음");
    }

    if(!canEditEvent(target)){
        return showToast("본인 일정만 삭제 가능");
    }

    await deleteDoc(doc(db,"events",id));

    state.events =
        state.events.filter(e=>e.id !== id);

    renderCalendar();

    showToast("삭제 완료");
};

    /* =========================
       CLOSE
    ========================= */

    window.closeModal = function(id){

        document.getElementById(id).style.display = "none";
    };

    /* =========================
       SAVE
    ========================= */

    document.getElementById('saveBtn').onclick = async ()=>{

        const title =
            document.getElementById('eventTitle')
                    .value.trim();

        const time =
            document.getElementById('eventTime')
                    .value;

        const memo =
            document.getElementById('eventInitialMemo')
                    .value;

        if(!state.selectedDateStr)
            return showToast("날짜 선택");

        if(!title)
            return showToast("제목 입력");

        const data = {

            date: state.selectedDateStr,

            title,

            time,

            memo,

            userColor: state.currentUser.color,

            userUid: state.currentUser.uid,

            userEmail: state.currentUser.email,

            userName: state.currentUser.name
        };

        if(state.editId){

            await updateDoc(
                doc(db,"events",state.editId),
                data
            );

            const idx =
                state.events.findIndex(
                    e=>e.id===state.editId
                );

            state.events[idx] = {
                ...state.events[idx],
                ...data
            };

            state.editId = null;

            showToast("수정 완료");

        } else {

            const ref =
                await addDoc(
                    collection(db,"events"),
                    data
                );

            state.events.push({

                id: ref.id,
                ...data
            });

            showToast("저장 완료");
        }

        renderCalendar();

        closeModal('editModal');
    };

    /* =========================
       CALENDAR
    ========================= */

    function renderCalendar(){

        calendarEl.innerHTML = '';

        const y =
            state.currentDate.getFullYear();

        const m =
            state.currentDate.getMonth();

        monthDisplay.innerText =
            `${y}년 ${m+1}월`;

        const days = [
            '일','월','화',
            '수','목','금','토'
        ];

        days.forEach(d=>{

            const el =
                document.createElement('div');

            el.className = "day-label";

            el.innerText = d;

            calendarEl.appendChild(el);
        });

        const first =
            new Date(y,m,1).getDay();

        const last =
            new Date(y,m+1,0).getDate();

        const todayStr =
            new Date()
                .toISOString()
                .split("T")[0];

        for(let i=0;i<first;i++){

            calendarEl.appendChild(
                document.createElement('div')
            );
        }

        for(let d=1; d<=last; d++){

            const dateStr =
                `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

            const shift =
                getShiftLabel(dateStr);

            const div =
                document.createElement('div');

            div.className = "calendar-day";

            /* 오늘 강조 */
            if(dateStr === todayStr){

                div.style.outline =
                    "3px solid #4f46e5";

                div.style.background =
                    "#eef2ff";
            }

            div.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;">

                    <span class="day-num">
                        ${d}
                    </span>

                    <span style="font-size:10px;font-weight:800;color:#64748b;">
                        ${shift}
                    </span>

                </div>
            `;

            const events =
                state.events.filter(
                    e=>e.date === dateStr
                );

            events.forEach(e=>{

                const bar =
                    document.createElement('div');

                bar.className = "event-bar";

                bar.style.background =
                    e.userColor;

                bar.innerText = e.title;

                bar.onclick = (ev)=>{

                    ev.stopPropagation();

                    openEventDetail(e);
                };

                div.appendChild(bar);
            });

            div.onclick = ()=>openDayModal(dateStr);

            calendarEl.appendChild(div);
        }
    }

    /* =========================
       DAY MODAL
    ========================= */

    window.openDayModal = function(dateStr){

        state.selectedDateStr = dateStr;

        state.viewMode = "list";

        const modal =
            document.getElementById('dayModal');

        const list =
            document.getElementById('modalEventList');

        const title =
            document.getElementById('modalDateTitle');

        title.innerText = dateStr;

        const events =
            state.events.filter(
                e=>e.date===dateStr
            );

        list.innerHTML = "";

        events.forEach(e=>{

            const div =
                document.createElement('div');

            div.className =
                "p-3 bg-gray-100 rounded-xl cursor-pointer";

            div.innerHTML = `
                <b>${e.title}</b><br/>
                <small>${e.time || ""}</small>
            `;

            div.onclick = ()=>openEventDetail(e);

            list.appendChild(div);
        });

        modal.style.display = "flex";
    };

    /* =========================
       DETAIL MODAL
    ========================= */

    window.openEventDetail = function(e){

        state.selectedEvent = e;

        state.viewMode = "detail";

        const modal =
            document.getElementById('dayModal');

        const list =
            document.getElementById('modalEventList');

       const editable = canEditEvent(e);

list.innerHTML = `
    <div class="p-4 bg-white rounded-xl border shadow">

        <div class="font-bold text-lg">
            ${e.title}
        </div>

        <div class="text-sm text-gray-500">
            ${e.time || ""}
        </div>

        <div class="mt-2 text-sm">
            ${e.memo || ""}
        </div>

        <div class="mt-2 text-xs font-bold"
             style="color:${e.userColor};">

            작성자 : ${e.userName}
        </div>

        <div style="margin-top:12px;display:flex;gap:6px;">

            ${
                editable
                ?
                `
                <button
                    onclick='editEvent(${JSON.stringify(e).replaceAll('"','&quot;')})'
                    class="px-3 py-1 bg-indigo-500 text-white rounded">

                    수정

                </button>

                <button
                    onclick="deleteEvent('${e.id}')"
                    class="px-3 py-1 bg-red-500 text-white rounded">

                    삭제

                </button>
                `
                :
                ``
            }

            <button
                onclick="openDayModal('${e.date}')"
                class="px-3 py-1 bg-gray-400 text-white rounded">

                목록

            </button>

        </div>

    </div>
    
`;
        modal.style.display = "flex";
};

    /* =========================
   CHAT
========================= */

const chatMessages =
    document.getElementById("chatMessages");
    
const chatInput =
    document.getElementById("chatInput");  // ⭐ 이거 추가
    

    /* ⭐ 여기 바로 추가 */
chatInput.addEventListener("keydown", (e) => {
    if (e.isComposing) return; // 한글 입력 중 방지

    if (e.key === "Enter") {
        e.preventDefault();
        document.getElementById("sendChatBtn").click();
    }
});

/* SEND */
document.getElementById("sendChatBtn").onclick =
async ()=>{

    if(!state.currentUser){

        return showToast("로그인 필요");
    }

    const input =
        document.getElementById("chatInput");

    const text =
        input.value.trim();

    if(!text)
        return;

    await addDoc(collection(db,"messages"),{

        text,

        userName: state.currentUser.name,

        userColor: state.currentUser.color,

        userUid: state.currentUser.uid,

        createdAt: serverTimestamp()
    });

    input.value = "";
};

/* LISTEN */

function listenChat(){

    if(!state.currentUser) return; // ⭐ 추가

    if(chatUnsub){
        chatUnsub(); // 기존 리스너 제거
    }

    const q = query(
        collection(db,"messages"),
        orderBy("createdAt"),
        limit(100)
    );

    chatUnsub = onSnapshot(q,(snapshot)=>{

        chatMessages.innerHTML = "";

        snapshot.forEach(doc => {

            const m = doc.data();

            const isMine =
                state.currentUser &&
                m.userUid === state.currentUser.uid;

            const time = m.createdAt?.toDate
                ? m.createdAt.toDate().toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})
                : "";

            const div = document.createElement("div");

div.className = `chat-item ${isMine ? "chat-right" : "chat-left"}`;

div.innerHTML = `
    <div class="chat-box">
        <div class="chat-meta">
            <span>${m.userName}</span>
            <span class="chat-time">${time}</span>
        </div>

        <div class="chat-bubble"
             style="
                background:${m.userColor};
                color:white;
             ">
            ${m.text}
        </div>
    </div>
`;

            chatMessages.appendChild(div);
        });

        chatMessages.scrollTop = chatMessages.scrollHeight;
    });
}

onMessage(messaging,(payload)=>{
