<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>나의 스마트 스케줄러</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        :root {
            --calendar-bg: #ffffff;
            --day-hover: #f9fafb;
            --sunday-text: #ef4444;
            --saturday-text: #3b82f6;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f3f4f6;
            overscroll-behavior: none;
        }

        .calendar-container {
            max-width: 1200px;
            margin: 0 auto;
            min-height: 90vh;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: minmax(100px, 1fr);
            background-color: #e5e7eb;
            gap: 1px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .calendar-grid { grid-auto-rows: minmax(140px, 1fr); }
        }

        .calendar-day {
            background: var(--calendar-bg);
            padding: 8px;
            transition: background 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
        }

        .calendar-day:hover { background: var(--day-hover); }
        .calendar-day.today { background: #fffbeb; }
        
        .day-num { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
        .day-label { text-align: center; padding: 12px 0; font-weight: 800; font-size: 0.8rem; color: #6b7280; background: #fff; }

        .event-bar {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalFadeIn 0.3s ease-out;
            pointer-events: auto; /* 컨텐츠 내부 클릭은 이벤트 전파 */
        }

        @keyframes modalFadeIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .btn-primary { background: #4f46e5; color: white; padding: 12px; border-radius: 12px; font-weight: 700; width: 100%; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="calendar-container">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 id="monthDisplay" class="text-2xl md:text-3xl font-extrabold text-gray-900 tracking-tight">2023년 10월</h1>
            </div>
            <div class="flex gap-2">
                <button id="prevMonth" class="bg-white border p-2 px-4 rounded-xl font-bold shadow-sm active:bg-gray-100">이전</button>
                <button id="nextMonth" class="bg-white border p-2 px-4 rounded-xl font-bold shadow-sm active:bg-gray-100">다음</button>
            </div>
        </header>

        <div id="calendar" class="calendar-grid shadow-xl">
            <!-- JS에서 동적 생성됨 -->
        </div>

        <footer class="mt-8 flex flex-wrap justify-center gap-4 border-t pt-6">
            <button id="exportBtn" class="text-sm font-semibold text-gray-500 hover:text-indigo-600 transition">데이터 백업 (JSON)</button>
            <button id="importBtn" class="text-sm font-semibold text-gray-500 hover:text-indigo-600 transition">데이터 복구</button>
            <input type="file" id="importFile" class="hidden" accept=".json">
        </footer>
    </div>

    <div id="dayModal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 id="modalDateTitle" class="text-xl font-bold text-gray-900">10월 25일</h2>
                    <p class="text-sm text-gray-500 font-medium">이날의 일정 목록</p>
                </div>
                <button onclick="closeModal('dayModal')" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>

            <div id="modalEventList" class="space-y-4 mb-6">
                <!-- 일정 아이템 동적 생성 -->
            </div>

            <button onclick="openAddForm()" class="btn-primary flex items-center justify-center gap-2">
                <span>+ 새 일정 추가하기</span>
            </button>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 id="formTitle" class="text-xl font-bold">📅 일정 작성</h2>
                <button onclick="closeModal('editModal')" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">제목</label>
                    <input type="text" id="eventTitle" class="w-full p-4 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="어떤 일인가요?">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">시간</label>
                        <input type="time" id="eventTime" class="w-full p-4 bg-gray-50 border rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">색상</label>
                        <select id="eventColor" class="w-full p-4 bg-gray-50 border rounded-xl outline-none">
                            <option value="#6366f1">보라 (기본)</option>
                            <option value="#ef4444">빨강 (중요)</option>
                            <option value="#10b981">초록 (운동)</option>
                            <option value="#f59e0b">노랑 (약속)</option>
                            <option value="#ec4899">핑크 (생일)</option>
                        </select>
                    </div>
                </div>
                <input type="hidden" id="editId">
                <button id="saveBtn" class="btn-primary mt-4">일정 저장하기</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            currentDate: new Date(),
            selectedDateStr: "",
            events: JSON.parse(localStorage.getItem('scheduler_v8')) || [],
            notifPermission: Notification.permission
        };

        const calendarEl = document.getElementById('calendar');
        const monthDisplay = document.getElementById('monthDisplay');
        const saveBtn = document.getElementById('saveBtn');

        window.onload = () => {
            renderCalendar();
            setupNotifications();
            setupModalClosing(); // 배경 클릭 닫기 이벤트 등록
        };

        function setupModalClosing() {
            // 모든 모달 오버레이를 찾아서 클릭 이벤트를 추가합니다.
            const modals = document.querySelectorAll('.modal-overlay');
            modals.forEach(modal => {
                modal.addEventListener('click', (e) => {
                    // 클릭된 타겟이 'content'가 아닌 'overlay' 자체일 경우에만 닫습니다.
                    if (e.target === modal) {
                        closeModal(modal.id);
                    }
                });
            });
        }

        function setupNotifications() {
            if (state.notifPermission === 'default') {
                Notification.requestPermission().then(p => state.notifPermission = p);
            }
            setInterval(() => {
                if (state.notifPermission !== 'granted') return;
                const now = new Date();
                const dStr = formatDate(now);
                const tStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                
                state.events.forEach(ev => {
                    if (ev.date === dStr && ev.time === tStr && !ev.notified) {
                        new Notification(`[일정] ${ev.title}`, { body: `${ev.time} 일정이 시작됩니다.` });
                        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                        ev.notified = true;
                        saveData();
                    }
                });
            }, 60000);
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function saveData() {
            localStorage.setItem('scheduler_v8', JSON.stringify(state.events));
        }

        function renderCalendar() {
            calendarEl.innerHTML = '';
            const year = state.currentDate.getFullYear();
            const month = state.currentDate.getMonth();
            monthDisplay.innerText = `${year}년 ${month + 1}월`;

            ['일', '월', '화', '수', '목', '금', '토'].forEach((day, i) => {
                const label = document.createElement('div');
                label.className = 'day-label';
                if (i === 0) label.style.color = 'var(--sunday-text)';
                if (i === 6) label.style.color = 'var(--saturday-text)';
                label.innerText = day;
                calendarEl.appendChild(label);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day bg-gray-50 cursor-default';
                calendarEl.appendChild(empty);
            }

            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayDiv = document.createElement('div');
                dayDiv.className = 'calendar-day';
                if (dateStr === formatDate(new Date())) dayDiv.classList.add('today');
                
                dayDiv.innerHTML = `<span class="day-num">${d}</span>`;
                
                const dayEvents = state.events.filter(e => e.date === dateStr);
                dayEvents.sort((a, b) => (a.time || "99:99").localeCompare(b.time || "99:99"));
                
                dayEvents.slice(0, 3).forEach(ev => {
                    const bar = document.createElement('div');
                    bar.className = 'event-bar';
                    bar.style.backgroundColor = ev.color;
                    bar.innerText = (ev.time ? ev.time + ' ' : '') + ev.title;
                    dayDiv.appendChild(bar);
                });

                if (dayEvents.length > 3) {
                    const more = document.createElement('div');
                    more.className = 'text-[10px] font-bold text-gray-400 pl-1';
                    more.innerText = `+${dayEvents.length - 3} 더보기`;
                    dayDiv.appendChild(more);
                }

                dayDiv.onclick = () => openDayModal(dateStr);
                calendarEl.appendChild(dayDiv);
            }
        }

        function openDayModal(dateStr) {
            state.selectedDateStr = dateStr;
            const d = new Date(dateStr);
            document.getElementById('modalDateTitle').innerText = `${d.getMonth()+1}월 ${d.getDate()}일`;
            renderModalEvents();
            document.getElementById('dayModal').style.display = 'flex';
        }

        function renderModalEvents() {
            const list = document.getElementById('modalEventList');
            list.innerHTML = '';
            const dayEvents = state.events.filter(e => e.date === state.selectedDateStr);

            if (dayEvents.length === 0) {
                list.innerHTML = `<div class="py-10 text-center text-gray-400 font-medium">등록된 일정이 없습니다.</div>`;
                return;
            }

            dayEvents.forEach(ev => {
                const item = document.createElement('div');
                item.className = 'bg-white border-2 rounded-2xl p-4 shadow-sm';
                item.style.borderColor = ev.color;
                item.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h4 class="font-extrabold text-lg">${ev.title}</h4>
                            <span class="text-xs font-bold text-gray-400">${ev.time ? '⏰ ' + ev.time : '시간 미설정'}</span>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="editEvent('${ev.id}')" class="text-indigo-600 font-bold text-sm">수정</button>
                            <button onclick="deleteEvent('${ev.id}')" class="text-red-500 font-bold text-sm">삭제</button>
                        </div>
                    </div>
                    <div class="mt-3 space-y-2">
                        ${(ev.comments || []).map(c => `<div class="text-sm bg-gray-50 p-2 rounded-lg text-gray-600 leading-relaxed border-l-4 border-gray-200">${c}</div>`).join('')}
                    </div>
                    <button onclick="addComment('${ev.id}')" class="mt-3 text-xs font-bold text-gray-400 hover:text-indigo-600">+ 메모 추가</button>
                `;
                list.appendChild(item);
            });
        }

        function openAddForm() {
            document.getElementById('formTitle').innerText = "📅 일정 추가";
            document.getElementById('editId').value = "";
            document.getElementById('eventTitle').value = "";
            document.getElementById('eventTime').value = "";
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        saveBtn.onclick = () => {
            const title = document.getElementById('eventTitle').value.trim();
            const time = document.getElementById('eventTime').value;
            const color = document.getElementById('eventColor').value;
            const editId = document.getElementById('editId').value;

            if (!title) return;

            if (editId) {
                const idx = state.events.findIndex(e => e.id === editId);
                state.events[idx] = { ...state.events[idx], title, time, color, notified: false };
            } else {
                state.events.push({
                    id: 'ev' + Date.now(),
                    date: state.selectedDateStr,
                    title, time, color,
                    comments: [],
                    notified: false
                });
            }

            saveData();
            renderCalendar();
            renderModalEvents();
            closeModal('editModal');
        };

        window.deleteEvent = (id) => {
            if (!confirm("이 일정을 삭제하시겠습니까?")) return;
            state.events = state.events.filter(e => e.id !== id);
            saveData();
            renderCalendar();
            renderModalEvents();
        };

        window.editEvent = (id) => {
            const ev = state.events.find(e => e.id === id);
            document.getElementById('formTitle').innerText = "📝 일정 수정";
            document.getElementById('editId').value = ev.id;
            document.getElementById('eventTitle').value = ev.title;
            document.getElementById('eventTime').value = ev.time || "";
            document.getElementById('eventColor').value = ev.color;
            document.getElementById('editModal').style.display = 'flex';
        };

        window.addComment = (id) => {
            const msg = prompt("메모를 입력하세요:");
            if (msg && msg.trim()) {
                const idx = state.events.findIndex(e => e.id === id);
                if (!state.events[idx].comments) state.events[idx].comments = [];
                state.events[idx].comments.push(msg.trim());
                saveData();
                renderModalEvents();
            }
        };

        document.getElementById('prevMonth').onclick = () => { state.currentDate.setMonth(state.currentDate.getMonth() - 1); renderCalendar(); };
        document.getElementById('nextMonth').onclick = () => { state.currentDate.setMonth(state.currentDate.getMonth() + 1); renderCalendar(); };

        document.getElementById('exportBtn').onclick = () => {
            const blob = new Blob([JSON.stringify(state.events, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `calendar_backup_${formatDate(new Date())}.json`;
            a.click();
        };

        document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
        document.getElementById('importFile').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    state.events = JSON.parse(ev.target.result);
                    saveData();
                    renderCalendar();
                    alert("데이터 복구가 완료되었습니다.");
                } catch(err) { alert("잘못된 파일 형식입니다."); }
            };
            reader.readAsText(file);
        };
    </script>
</body>
</html>
