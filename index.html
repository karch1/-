<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>나의 스마트 스케줄러</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        :root {
            --calendar-bg: #ffffff;
            --day-hover: #f9fafb;
            --sunday-text: #ef4444;
            --saturday-text: #3b82f6;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f3f4f6;
            overscroll-behavior: none;
            margin: 0;
            padding: 0;
        }

        .calendar-container {
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            grid-auto-rows: minmax(100px, 1fr);
            background-color: #e5e7eb;
            gap: 1px;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
            flex-grow: 1;
        }

        @media (min-width: 768px) {
            .calendar-grid { grid-auto-rows: minmax(140px, 1fr); }
        }

        .calendar-day {
            background: var(--calendar-bg);
            padding: 6px;
            transition: background 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 2px;
            position: relative;
            min-width: 0;
            overflow: hidden;
        }

        .calendar-day:hover { background: var(--day-hover); }
        .calendar-day.today { background: #fffbeb; }
        .calendar-day.selected { outline: 3px solid #4f46e5; z-index: 10; }
        
        .day-num {
            font-weight: 700;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            margin-bottom: 4px;
        }

        .day-label {
            text-align: center;
            padding: 12px 0;
            font-weight: 800;
            font-size: 0.75rem;
            color: #6b7280;
            background: #fff;
        }

        .event-bar {
            font-size: clamp(0.6rem, 1.5vw, 0.7rem);
            padding: 3px 6px;
            border-radius: 6px;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 700;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 1rem;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .comment-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            background: #f9fafb;
            padding: 10px 14px;
            border-radius: 12px;
            border-left: 4px solid #e5e7eb;
            margin-bottom: 8px;
        }

        .comment-text {
            font-size: 0.85rem;
            color: #4b5563;
            font-weight: 500;
            line-height: 1.4;
            word-break: break-all;
        }

        .comment-delete {
            color: #d1d5db;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 4px;
        }

        .comment-delete:hover {
            color: #ef4444;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 800;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
            background: #4338ca;
        }

        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>

<body>

<div class="calendar-container">
    <header class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 id="monthDisplay"
                class="text-2xl md:text-3xl font-extrabold text-gray-900 tracking-tight">
                불러오는 중...
            </h1>
        </div>

        <div class="flex gap-2">
            <button id="prevMonth"
                    class="bg-white border-2 border-gray-100 p-2 px-5 rounded-2xl font-bold shadow-sm active:bg-gray-50 text-gray-700">
                이전
            </button>

            <button id="nextMonth"
                    class="bg-white border-2 border-gray-100 p-2 px-5 rounded-2xl font-bold shadow-sm active:bg-gray-50 text-gray-700">
                다음
            </button>
        </div>
    </header>

    <div id="calendar" class="calendar-grid shadow-2xl"></div>

    <footer class="mt-6 flex justify-center gap-4">
        <button id="exportBtn"
                class="text-xs font-bold text-gray-400 hover:text-indigo-500 transition-colors">
            데이터 백업
        </button>

        <button id="importBtn"
                class="text-xs font-bold text-gray-400 hover:text-indigo-500 transition-colors">
            데이터 복구
        </button>

        <input type="file" id="importFile" class="hidden">
    </footer>
</div>

<div id="dayModal" class="modal-overlay" onclick="closeModal('dayModal')">
    <div class="modal-content p-7" onclick="event.stopPropagation()">

        <div class="flex justify-between items-start mb-6">
            <div>
                <h2 id="modalDateTitle"
                    class="text-2xl font-black text-gray-900">날짜</h2>

                <p class="text-sm text-gray-400 font-bold">
                    오늘의 일정
                </p>
            </div>

            <button onclick="closeModal('dayModal')"
                    class="text-gray-300 hover:text-gray-500 text-3xl font-light">
                &times;
            </button>
        </div>

        <div id="modalEventList" class="space-y-4 mb-8"></div>

        <button onclick="openAddForm()"
                class="btn-primary flex items-center justify-center gap-2">
            <span>+</span>
            <span>새로운 일정 추가</span>
        </button>

    </div>
</div>

<div id="editModal" class="modal-overlay" onclick="closeModal('editModal')">
    <div class="modal-content p-7" onclick="event.stopPropagation()">

        <div class="flex justify-between items-center mb-6">
            <h2 id="formTitle"
                class="text-xl font-black text-indigo-600">
                📅 일정 작성
            </h2>

            <button onclick="closeModal('editModal')"
                    class="text-gray-300 hover:text-gray-500 text-3xl font-light">
                &times;
            </button>
        </div>

        <div class="space-y-5">

            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">
                    일정 제목
                </label>

                <input type="text"
                       id="eventTitle"
                       placeholder="일정 이름을 입력하세요"
                       class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-indigo-500 outline-none font-bold">
            </div>

            <div class="grid grid-cols-2 gap-4">

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">
                        시간
                    </label>

                    <input type="time"
                           id="eventTime"
                           class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none font-bold">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">
                        색상
                    </label>

                    <select id="eventColor"
                            class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none font-bold">
                        <option value="#6366f1">보라 (업무)</option>
                        <option value="#ef4444">빨강 (중요)</option>
                        <option value="#10b981">초록 (운동)</option>
                        <option value="#f59e0b">노랑 (약속)</option>
                        <option value="#ec4899">핑크 (생일)</option>
                    </select>
                </div>

            </div>

            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">
                    상세 메모
                </label>

                <textarea id="eventInitialMemo"
                          rows="3"
                          placeholder="메모를 함께 입력하세요 (선택)"
                          class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-indigo-500 outline-none font-bold text-sm"></textarea>
            </div>

            <input type="hidden" id="editId">

            <button id="saveBtn" class="btn-primary">
                일정 저장하기
            </button>

        </div>
    </div>
</div>

<div id="commentModal" class="modal-overlay" onclick="closeModal('commentModal')">
    <div class="modal-content p-7" onclick="event.stopPropagation()">

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-indigo-600">
                📝 메모 추가
            </h2>

            <button onclick="closeModal('commentModal')"
                    class="text-gray-300 hover:text-gray-500 text-3xl font-light">
                &times;
            </button>
        </div>

        <div class="space-y-5">

            <textarea id="commentInput"
                      rows="4"
                      class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-indigo-500 outline-none font-bold text-sm"
                      placeholder="메모 내용을 입력하세요..."></textarea>

            <input type="hidden" id="commentTargetId">

            <button id="saveCommentBtn" class="btn-primary">
                메모 저장
            </button>

        </div>
    </div>
</div>

<div id="toast">메시지가 표시됩니다.</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBU3jeOqj_FCBXeO2ghh5XlHBrQbUjNaiA",
    authDomain: "ahn-jin-zero.firebaseapp.com",
    projectId: "ahn-jin-zero",
    storageBucket: "ahn-jin-zero.firebasestorage.app",
    messagingSenderId: "55250475892",
    appId: "1:55250475892:web:c87555da879be518faaa21",
    measurementId: "G-V2TEL4TNPJ"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


    const state = {
        currentDate: new Date(),
        events: JSON.parse(localStorage.getItem('smart_scheduler_final')) || [],
        selectedDateStr: '',
        notifPermission: ('Notification' in window)
            ? Notification.permission
            : 'denied'
    };

    const calendarEl = document.getElementById('calendar');
    const monthDisplay = document.getElementById('monthDisplay');

    function showToast(msg) {
        const toast = document.getElementById('toast');

        toast.innerText = msg;
        toast.style.opacity = '1';

        setTimeout(() => {
            toast.style.opacity = '0';
        }, 2000);
    }

    window.closeModal = function(id) {
        document.getElementById(id).style.display = 'none';
    };

    window.openAddForm = function() {

        document.getElementById('formTitle').innerText = "📅 일정 작성";
        document.getElementById('editId').value = "";
        document.getElementById('eventTitle').value = "";
        document.getElementById('eventTime').value = "";
        document.getElementById('eventInitialMemo').value = "";

        document.getElementById('editModal').style.display = 'flex';
    };

    function renderCalendar() {

        calendarEl.innerHTML = '';

        const year = state.currentDate.getFullYear();
        const month = state.currentDate.getMonth();

        monthDisplay.innerText = `${year}년 ${month + 1}월`;

        const dayLabels = ['일', '월', '화', '수', '목', '금', '토'];

        dayLabels.forEach((day, i) => {

            const label = document.createElement('div');

            label.className = 'day-label';

            if (i === 0) {
                label.style.color = 'var(--sunday-text)';
            }

            if (i === 6) {
                label.style.color = 'var(--saturday-text)';
            }

            label.innerText = day;

            calendarEl.appendChild(label);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {

            const empty = document.createElement('div');

            empty.className = 'calendar-day bg-gray-50/50 cursor-default';

            calendarEl.appendChild(empty);
        }

        for (let d = 1; d <= lastDate; d++) {

            const dateStr =
                `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

            const dayDiv = document.createElement('div');

            dayDiv.className = 'calendar-day';

            if (dateStr === formatDate(new Date())) {
                dayDiv.classList.add('today');
            }

            if (dateStr === state.selectedDateStr) {
                dayDiv.classList.add('selected');
            }

            dayDiv.innerHTML = `<span class="day-num">${d}</span>`;

            const dayEvents = state.events.filter(e => e.date === dateStr);

            dayEvents.sort((a, b) =>
                (a.time || "99:99").localeCompare(b.time || "99:99")
            );

            const maxVisible = window.innerWidth < 768 ? 2 : 3;

            dayEvents.slice(0, maxVisible).forEach(ev => {

                const bar = document.createElement('div');

                bar.className = 'event-bar';
                bar.style.backgroundColor = ev.color;
                bar.innerText = ev.title;

                dayDiv.appendChild(bar);
            });

            if (dayEvents.length > maxVisible) {

                const more = document.createElement('div');

                more.className =
                    'text-[9px] font-black text-indigo-400 mt-auto text-right';

                more.innerText = `+${dayEvents.length - maxVisible}`;

                dayDiv.appendChild(more);
            }

            dayDiv.onclick = () => openDayModal(dateStr);

            calendarEl.appendChild(dayDiv);
        }
    }

    function openDayModal(dateStr) {

        state.selectedDateStr = dateStr;

        const d = new Date(dateStr);

        document.getElementById('modalDateTitle').innerText =
            `${d.getMonth() + 1}월 ${d.getDate()}일`;

        renderModalEvents();

        document.getElementById('dayModal').style.display = 'flex';

        renderCalendar();
    }

    function renderModalEvents() {

        const list = document.getElementById('modalEventList');

        list.innerHTML = '';

        const dayEvents =
            state.events.filter(e => e.date === state.selectedDateStr);

        if (dayEvents.length === 0) {

            list.innerHTML =
                `<div class="py-16 text-center text-gray-300 font-bold">등록된 일정이 없습니다.</div>`;

            return;
        }

        dayEvents.forEach(ev => {

            const item = document.createElement('div');

            item.className =
                'bg-white border-2 rounded-2xl p-5 shadow-sm';

            item.style.borderColor = ev.color;

            const commentsHtml = (ev.comments || []).map((c, idx) => `
                <div class="comment-item">
                    <span class="comment-text">${c}</span>
                    <span class="comment-delete"
                          onclick="deleteComment('${ev.id}', ${idx})">
                          &times;
                    </span>
                </div>
            `).join('');

            item.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex-1 pr-4">
                        <h4 class="font-black text-lg text-gray-900 leading-tight">
                            ${ev.title}
                        </h4>

                        <span class="text-xs font-bold text-gray-400 block mt-1">
                            ${ev.time ? '⏰ ' + ev.time : '시간 미설정'}
                        </span>
                    </div>

                    <div class="flex gap-4">
                        <button onclick="editEvent('${ev.id}')"
                                class="text-indigo-500 font-black text-xs">
                            수정
                        </button>

                        <button onclick="deleteEvent('${ev.id}')"
                                class="text-red-400 font-black text-xs">
                            삭제
                        </button>
                    </div>
                </div>

                <div class="mt-4 space-y-1">
                    ${commentsHtml}
                </div>

                <button onclick="openCommentModal('${ev.id}')"
                        class="mt-4 text-[10px] font-black text-gray-300 hover:text-indigo-400">
                    + 메모 추가
                </button>
            `;

            list.appendChild(item);
        });
    }

    document.getElementById('saveBtn').onclick = function() {

        const title =
            document.getElementById('eventTitle').value.trim();

        const time =
            document.getElementById('eventTime').value;

        const color =
            document.getElementById('eventColor').value;

        const initialMemo =
            document.getElementById('eventInitialMemo').value.trim();

        const editId =
            document.getElementById('editId').value;

        if (!title) {
            showToast("제목을 입력해주세요!");
            return;
        }

        if (editId) {

            const idx =
                state.events.findIndex(e => e.id === editId);

            state.events[idx] = {
                ...state.events[idx],
                title,
                time,
                color,
                notified: false
            };

            if (initialMemo) {
                state.events[idx].comments.push(initialMemo);
            }

        } else {

            const newComments =
                initialMemo ? [initialMemo] : [];

            state.events.push({
                id: 'ev_' + Date.now(),
                date: state.selectedDateStr,
                title,
                time,
                color,
                notified: false,
                comments: newComments
            });
        }

        saveData();

        renderCalendar();
        renderModalEvents();

        closeModal('editModal');

        showToast("일정이 저장되었습니다.");
    };

    function saveData() {

        localStorage.setItem(
            'smart_scheduler_final',
            JSON.stringify(state.events)
        );
    }

    function formatDate(date) {

        return `${date.getFullYear()}-${
            String(date.getMonth() + 1).padStart(2, '0')
        }-${
            String(date.getDate()).padStart(2, '0')
        }`;
    }

    window.deleteEvent = (id) => {

        if (!confirm("이 일정을 삭제할까요?")) {
            return;
        }

        state.events =
            state.events.filter(e => e.id !== id);

        saveData();

        renderCalendar();
        renderModalEvents();

        showToast("삭제되었습니다.");
    };

    window.editEvent = (id) => {

        const ev =
            state.events.find(e => e.id === id);

        document.getElementById('formTitle').innerText =
            "📝 일정 수정";

        document.getElementById('editId').value = ev.id;
        document.getElementById('eventTitle').value = ev.title;
        document.getElementById('eventTime').value = ev.time || "";
        document.getElementById('eventColor').value = ev.color;
        document.getElementById('eventInitialMemo').value = "";

        document.getElementById('editModal').style.display = 'flex';
    };

    window.openCommentModal = (id) => {

        document.getElementById('commentTargetId').value = id;

        document.getElementById('commentInput').value = "";

        document.getElementById('commentModal').style.display = 'flex';

        setTimeout(() => {
            document.getElementById('commentInput').focus();
        }, 100);
    };

    document.getElementById('saveCommentBtn').onclick = () => {

        const id =
            document.getElementById('commentTargetId').value;

        const text =
            document.getElementById('commentInput').value.trim();

        if (!text) {
            return;
        }

        const idx =
            state.events.findIndex(e => e.id === id);

        if (idx !== -1) {

            state.events[idx].comments.push(text);

            saveData();

            renderModalEvents();

            closeModal('commentModal');

            showToast("메모가 추가되었습니다.");
        }
    };

    window.deleteComment = (eventId, commentIdx) => {

        const evIdx =
            state.events.findIndex(e => e.id === eventId);

        if (evIdx !== -1) {

            state.events[evIdx].comments.splice(commentIdx, 1);

            saveData();

            renderModalEvents();
        }
    };

    document.getElementById('prevMonth').onclick = () => {

        state.currentDate.setMonth(
            state.currentDate.getMonth() - 1
        );

        renderCalendar();
    };

    document.getElementById('nextMonth').onclick = () => {

        state.currentDate.setMonth(
            state.currentDate.getMonth() + 1
        );

        renderCalendar();
    };

    document.getElementById('exportBtn').onclick = () => {

        const blob = new Blob(
            [JSON.stringify(state.events, null, 2)],
            { type: "application/json" }
        );

        const a = document.createElement('a');

        a.href = URL.createObjectURL(blob);

        a.download =
            `scheduler_backup_${formatDate(new Date())}.json`;

        a.click();

        showToast("백업 파일이 다운로드됩니다.");
    };

    document.getElementById('importBtn').onclick = () => {

        document.getElementById('importFile').click();
    };

    document.getElementById('importFile').onchange = (e) => {

        const file = e.target.files[0];

        if (!file) {
            return;
        }

        const reader = new FileReader();

        reader.onload = (ev) => {

            try {

                const data = JSON.parse(ev.target.result);

                state.events = data;

                saveData();

                renderCalendar();

                showToast("데이터 복구 완료!");

            } catch (err) {

                showToast("파일 형식이 잘못되었습니다.");
            }
        };

        reader.readAsText(file);
    };

function init() {

    console.log("init 실행");

    async function firebaseTest() {

        console.log("firebaseTest 시작");

        try {

            await addDoc(collection(db, "events"), {
                title: "테스트 일정",
                date: "2026-05-14"
            });

            console.log("파이어베이스 저장 성공");

        } catch (e) {

            console.error("파이어베이스 에러", e);
        }
    }

    firebaseTest();

    renderCalendar();

    setInterval(() => {

        const now = new Date();

        const nowStr = formatDate(now);

        const timeStr =
            `${String(now.getHours()).padStart(2, '0')}:${
                String(now.getMinutes()).padStart(2, '0')
            }`;

        state.events.forEach(ev => {

            if (
                ev.date === nowStr &&
                ev.time === timeStr &&
                !ev.notified
            ) {

                if (
                    'Notification' in window &&
                    Notification.permission === 'granted'
                ) {

                    new Notification(
                        `[스케줄러] ${ev.title}`,
                        {
                            body: "일정 시간이 되었습니다!"
                        }
                    );

                    if (navigator.vibrate) {
                        navigator.vibrate([200, 100, 200]);
                    }
                }

                ev.notified = true;

                saveData();
            }
        });

    }, 30000);

    if ('Notification' in window) {

        if (Notification.permission === 'default') {

            Notification.requestPermission();
        }
    }
}

console.log("스크립트 로딩 완료");

init();
</script>
