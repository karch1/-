<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>나의 스마트 스케줄러</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 0;
        }

        .calendar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
            flex-grow: 1;
            align-content: start;
        }

        .calendar-day {
            background: #fff;
            padding: 6px;
            min-height: 100px;
            cursor: pointer;
        }

        .day-label {
            text-align: center;
            padding: 10px;
            font-weight: 800;
            background: #fff;
        }

        .event-bar {
            font-size: 12px;
            padding: 3px 6px;
            border-radius: 6px;
            color: #fff;
            margin-top: 2px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #fff;
            width: 95%;
            max-width: 500px;
            border-radius: 16px;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-blue { background: #4f46e5; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .btn-gray { background: #6b7280; color: white; }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            opacity: 0;
            transition: 0.3s;
        }

        @media (max-width: 768px) {
            .calendar-container { padding: 0.5rem; }
            .calendar-day { min-height: 70px; padding: 4px; }
            .event-bar { font-size: 10px; padding: 2px 4px; }
            .day-label { font-size: 12px; padding: 6px; }
        }
    </style>
</head>

<body>

<div class="calendar-container">

    <header class="flex justify-between items-center mb-4">
        <h1 id="monthDisplay">로딩중...</h1>

        <div>
            <button id="loginBtn" onclick="loginGoogle()" class="btn btn-blue">로그인</button>
            <button id="logoutBtn" onclick="logoutGoogle()" class="btn btn-red" style="display:none;">로그아웃</button>
        </div>
    </header>

    <div id="calendar" class="calendar-grid"></div>

</div>

<div id="toast">알림</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBU3jeOqj_FCBXeO2ghh5XlHBrQbUjNaiA",
  authDomain: "ahn-jin-zero.firebaseapp.com",
  projectId: "ahn-jin-zero",
  storageBucket: "ahn-jin-zero.firebasestorage.app",
  messagingSenderId: "55250475892",
  appId: "1:55250475892:web:c87555da879be518faaa21",
  measurementId: "G-V2TEL4TNPJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const state = {
    currentDate: new Date(),
    events: [],
    selectedDateStr: null,
    currentUser: null
};

const userColorMap = {
    "choae000@gmail.com": { name: "갈치", color: "#6366f1" },
    "ssang9764@gmail.com": { name: "생마", color: "#38bdf8" },
    "cksgml0@naver.com": { name: "연막", color: "#8b5e3c" },
    "ahn7770@gmail.com": { name: "안크", color: "#ef4444" },
    "huigi@email.com": { name: "희기", color: "#f97316" },
};

const SHIFT_START = new Date("2026-05-04");
const SHIFT_PATTERN = [
    "주간","주간","주간","주간","주간",
    "휴","휴",
    "오후","오후","오후","오후","오후",
    "휴","휴",
    "야간","야간","야간","야간","야간",
    "휴","휴"
];

function getShiftLabel(dateStr){
    const target = new Date(dateStr);
    const diff = Math.floor((target - SHIFT_START) / 86400000);
    if(diff < 0) return "";
    return SHIFT_PATTERN[diff % SHIFT_PATTERN.length];
}

const calendarEl = document.getElementById('calendar');
const monthDisplay = document.getElementById('monthDisplay');

function showToast(msg){
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.opacity = 1;
    setTimeout(()=>t.style.opacity=0,2000);
}

/* LOGIN */
window.loginGoogle = async () => {
    await signInWithPopup(auth, provider);
};

window.logoutGoogle = async () => {
    await signOut(auth);
};

/* AUTH */
onAuthStateChanged(auth, (user)=>{

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    if(user && userColorMap[user.email]){
        state.currentUser = user;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
        loadEvents();
    } else {
        state.currentUser = null;
        state.events = [];
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
        renderCalendar();
    }
});

async function loadEvents(){
    const snap = await getDocs(collection(db,"events"));
    state.events = [];
    snap.forEach(d=>{
        state.events.push({ id:d.id, ...d.data() });
    });
    renderCalendar();
}

/* SAVE */
document.getElementById('calendar').onclick = async () => {};

function renderCalendar(){

    calendarEl.innerHTML = '';

    const y = state.currentDate.getFullYear();
    const m = state.currentDate.getMonth();

    monthDisplay.innerText = `${y}년 ${m+1}월`;

    const days = ['일','월','화','수','목','금','토'];

    days.forEach(d=>{
        const el = document.createElement('div');
        el.className = "day-label";
        el.innerText = d;
        calendarEl.appendChild(el);
    });

    const first = new Date(y,m,1).getDay();
    const last = new Date(y,m+1,0).getDate();

    for(let i=0;i<first;i++){
        calendarEl.appendChild(document.createElement('div'));
    }

    for(let d=1; d<=last; d++){

        const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const shift = getShiftLabel(dateStr);

        const div = document.createElement('div');
        div.className = "calendar-day";

        div.innerHTML = `
            <div style="display:flex;justify-content:space-between;">
                <span>${d}</span>
                <span style="font-size:10px;">${shift}</span>
            </div>
        `;

        const events = state.events.filter(e => e.date === dateStr);

        events.forEach(e=>{
            const bar = document.createElement('div');
            bar.className = "event-bar";
            bar.style.background = e.userColor;
            bar.innerText = e.title;
            div.appendChild(bar);
        });

        calendarEl.appendChild(div);
    }
}

</script>

</body>
</html>
